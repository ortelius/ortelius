# chart/ortelius/templates/secret.yaml
---
{{- $rbacrepo := required "ERROR: .Values.rbac_repo is required for security and must be explicitly set." .Values.rbac_repo }}
{{- $rbacrepotoken := required "ERROR: .Values.rbac_repo_token is required for security and must be explicitly set." .Values.rbac_repo_token }}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: rbac
data:
  RBACRepoToken: {{ $rbacrepotoken | b64enc }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: github-creds
data:
  ClientSecret: {{ .Values.github.clientSecret | b64enc | quote }}
  PrivateKey: {{ .Values.github.privateKey | b64enc | quote }}
  ReadOnlyToken: {{ .Values.github.readonly_token | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: google-oidc-creds
data:
  ClientSecret: {{ .Values.googleOidc.clientSecret | b64enc | quote }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: github-signin-creds
data:
  ClientSecret: {{ .Values.githubSignin.clientSecret | b64enc | quote }}
---
{{- if .Values.smtp.enabled }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: smtp-config
data:
  SMTPPassword: {{ .Values.smtp.password | b64enc | quote }}
{{- end }}
---
{{- $tokenEncKey := required "ERROR: .Values.tokenEncryptionKey is required. Generate with: openssl rand -base64 32" .Values.tokenEncryptionKey }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: token-encryption
data:
  TokenEncryptionKey: {{ $tokenEncKey | b64enc | quote }}
